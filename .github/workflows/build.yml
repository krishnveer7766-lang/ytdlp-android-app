name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip openjdk-17-jdk zip unzip \
          autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev git

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install cython==0.29.33
        pip install buildozer kivy kivymd

    - name: Write buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = YT Downloader
        package.name = ytdownloader
        package.domain = org.krishn
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 0.1
        requirements = python3,kivy,kivymd,yt-dlp,requests,certifi,brotli,mutagen,pycryptodomex
        orientation = portrait
        fullscreen = 0
        android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE
        android.api = 33
        android.minapi = 21
        android.ndk = 25b
        android.arch = arm64-v8a
        android.allow_backup = True
        log_level = 2
        warn_on_root = 1

        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOF

    - name: Accept Android licenses
      run: yes | buildozer android debug 2>&1 || true
      env:
        ACCEPT_SDK_LICENSES: yes

    - name: Build APK
      run: |
        yes | buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ytdownloader-apk
        path: bin/*.apk
